name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore RevitSpoolCopy.sln

      - name: Build (Release)
        run: dotnet build RevitSpoolCopy.sln -c Release --no-restore

      - name: Test
        run: dotnet test RevitSpoolCopy.Tests/RevitSpoolCopy.Tests.csproj -c Release --no-build --verbosity normal
